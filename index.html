<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>どんなとき芋 巡り店</title>

    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d35400" />

    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />

    <link rel="apple-touch-startup-image" href="/splash.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="どんなとき芋" />

    <script>
      (function () {
        var isAdminPath = window.location.pathname.startsWith("/kanri_aki");
        var manifest = document.getElementById("app-manifest");
        var themeColor = document.querySelector('meta[name="theme-color"]');
        var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');

        if (isAdminPath) {
          if (manifest) manifest.setAttribute("href", "/manifest-admin.json");
          if (themeColor) themeColor.setAttribute("content", "#2c3e50");
          if (appleTitle) appleTitle.setAttribute("content", "芋・管理");
        }
      })();
    </script>

    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 100000;
        background: #fdf5e6;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #boot-splash img {
        width: min(88vw, 420px);
        height: auto;
        object-fit: contain;
      }
      #boot-splash.hidden {
        opacity: 0;
        transition: opacity 220ms ease;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash"><img src="/splash.png" alt="どんなとき芋" /></div>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    <script>
      window.addEventListener("load", () => {
        const splash = document.getElementById("boot-splash");
        if (!splash) return;
        splash.classList.add("hidden");
        setTimeout(() => splash.remove(), 260);
      });
    </script>
  </body>
</html>
