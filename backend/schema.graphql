type Area {
  id: ID!
  name: String!
  lat: Float!
  lng: Float!
  catchCopy: String # AIが生成する一言
}

type Query {
  # 今日の営業エリアを取得
  getAreas: [Area]
}

type Mutation {
  # お義兄さんがエリアを登録する
  createArea(id: ID!, name: String!, lat: Float!, lng: Float!): Area
}

type Subscription {
  # お義兄さんが接近した時の通知をアプリで受け取る（リアルタイム用）
  onAreaEntered(id: ID!): Area
    @aws_subscribe(mutations: ["createArea"])
}