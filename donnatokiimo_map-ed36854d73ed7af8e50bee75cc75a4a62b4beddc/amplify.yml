version: 1
appSourceDirectory: "frontend"
backend:
    phases:
        build:
            commands:
                - 'amplifyPush --simple'
frontend:
    phases:
        preBuild:
            commands:
                - 'cd frontend && npm install'
        build:
            commands:
                - 'cd frontend && npm run build'
    artifacts:
        baseDirectory: frontend/dist
        files:
            - '**/*'
